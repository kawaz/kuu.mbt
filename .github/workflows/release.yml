name: Release

on:
  push:
    branches: [main]
    paths:
      - "VERSION"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # bump-semver vcs get latest-tag で全 tag が必要

      - name: Install bump-semver
        run: |
          set -euo pipefail
          LATEST=$(gh release list --repo kawaz/bump-semver --limit 1 --json tagName -q '.[0].tagName' | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            echo "::error::Could not fetch bump-semver latest release"
            exit 1
          fi
          curl -fsSL --retry 5 --retry-delay 2 --max-time 60 \
            "https://github.com/kawaz/bump-semver/releases/download/v${LATEST}/bump-semver-linux-amd64" \
            -o /usr/local/bin/bump-semver
          chmod +x /usr/local/bin/bump-semver
          bump-semver --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check version change
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          # VERSION=0.0.0 (or empty) はプレースホルダとしてスキップ
          if [ -z "$CURRENT_VERSION" ] || [ "$CURRENT_VERSION" = "0.0.0" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Placeholder version (${CURRENT_VERSION:-empty}); skipping release."
            exit 0
          fi

          # semver 形式の検証
          if ! bump-semver get "$CURRENT_VERSION" -qq; then
            echo "::error::Invalid VERSION format: ${CURRENT_VERSION}"
            exit 1
          fi

          # moon.mod の version との整合性検証 (= 多重 source of truth の防止)
          MOD_VERSION=$(grep '^version = ' moon.mod | sed -E 's/^version = "(.*)"$/\1/')
          if [ "$CURRENT_VERSION" != "$MOD_VERSION" ]; then
            echo "::error::VERSION (${CURRENT_VERSION}) does not match moon.mod version (${MOD_VERSION}). just bump-version で同期せよ。"
            exit 1
          fi

          # 既存 tag より大きいか検証
          set +e
          LATEST=$(bump-semver vcs get latest-tag --include-prerelease --vcs git 2>/dev/null)
          LATEST_EXIT=$?
          set -e
          if [ "$LATEST_EXIT" -ne 0 ]; then
            echo "vcs get latest-tag exited ${LATEST_EXIT} (no SemVer tags yet); assuming first release"
          else
            set +e
            bump-semver compare gt VERSION "$LATEST"
            CMP_EXIT=$?
            set -e
            case "$CMP_EXIT" in
              0) ;;  # VERSION > latest tag: release 続行
              1)
                echo "changed=false" >> "$GITHUB_OUTPUT"
                echo "Version v${CURRENT_VERSION} is not greater than latest tag ${LATEST}; skipping release."
                exit 0
                ;;
              *)
                echo "::error::Unexpected exit code from bump-semver compare: ${CMP_EXIT}"
                exit 1
                ;;
            esac
          fi

          # gh release 既存確認 (compare で通っても念のため)
          if gh release view "v${CURRENT_VERSION}" --repo "$REPO" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: v${CURRENT_VERSION} already released"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: v${CURRENT_VERSION}"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [wasm-gc, wasm, js]
    steps:
      - uses: actions/checkout@v6
      - uses: chawyehsu/setup-moonup@v1

      - name: Build (${{ matrix.target }} release)
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          moon build --target "$TARGET" --release
          # WASM bridge の成果物を kuu.wasm.{target}.{ext} として収集
          mkdir -p artifacts
          case "$TARGET" in
            wasm-gc|wasm)
              cp "_build/${TARGET}/release/build/wasm/wasm.wasm" "artifacts/kuu-${TARGET}.wasm"
              ;;
            js)
              cp "_build/js/release/build/wasm/wasm.js" "artifacts/kuu.js"
              ;;
          esac

      - uses: actions/upload-artifact@v7
        with:
          name: kuu-${{ matrix.target }}
          path: artifacts/*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release with tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --repo "$REPO" \
            --title "v${VERSION}" \
            --target "$COMMIT_SHA" \
            --generate-notes \
            artifacts/*
