name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - run: moon fmt --check
      - run: moon check --deny-warn --warn-list -20

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target: [native, wasm-gc, wasm, js]
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - name: Run tests
        env:
          TARGET: ${{ matrix.target }}
        run: moon test --target "$TARGET"

  wasm-test:
    name: WASM Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: moon build --target wasm-gc --package kawaz/kuu/wasm --release
      - run: node src/wasm/test.mjs

  example-test:
    name: Example Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - name: Test examples
        run: |
          failed=0
          found=0
          for dir in examples/*/; do
            if [ -f "$dir/moon.mod.json" ]; then
              found=1
              echo "=== Testing $dir ==="
              (cd "$dir" && moon test) || failed=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No MoonBit examples found"
          fi
          exit $failed

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - run: moon coverage analyze -- -f summary
