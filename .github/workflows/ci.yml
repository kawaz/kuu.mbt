name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # moon.mod 新形式 (source = "src" 等) を有効化する feature flag。
  # ローカル nightly toolchain は default で ON だが、CI install 後は明示が必要。
  MOON_FEATURES: rr_moon_mod,rr_moon_pkg

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: nightly
      - run: moonup default nightly
      - run: moon version --all
      - run: moon update
      - run: moon fmt --check
      - run: moon check --deny-warn

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target: [native, wasm-gc, wasm, js]
    steps:
      - uses: actions/checkout@v7
      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: nightly
      - run: moonup default nightly
      - run: moon update
      - name: Run tests
        env:
          TARGET: ${{ matrix.target }}
        run: moon test --target "$TARGET"

  wasm-test:
    name: WASM Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: nightly
      - run: moonup default nightly
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - run: moon update
      - run: moon build --target wasm-gc --package kawaz/kuu/wasm --release
      - run: node src/wasm/test.mjs

  example-test:
    name: Example Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: nightly
      - run: moonup default nightly
      - run: moon update
      - name: Test examples
        run: |
          failed=0
          found=0
          for dir in examples/*/; do
            if [ -f "$dir/moon.mod.json" ]; then
              found=1
              echo "=== Testing $dir ==="
              (cd "$dir" && moon update && moon test) || failed=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No MoonBit examples found"
          fi
          exit $failed

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: nightly
      - run: moonup default nightly
      - run: moon update
      - run: moon coverage analyze -- -f summary
