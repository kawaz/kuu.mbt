name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: 0.1.20260707+ca43856
      - run: moonup default 0.1.20260707+ca43856
      - run: moon version --all
      - run: moon update
      - run: moon fmt --check
      - run: moon check --deny-warn

  test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target: [wasm-gc, native]
    steps:
      - uses: actions/checkout@v7

      # conformance fixtures の正本 (kawaz/kuu) を SHA-pin で並置 checkout。
      # 追従は本 ref を bump する PR で明示化する (MDR-001 §5)。
      - name: Checkout kuu spec fixtures (SHA-pinned)
        uses: actions/checkout@v7
        with:
          repository: kawaz/kuu
          ref: e21646f557dd88bd4ae789411b16a83ea88e5e5f
          path: _kuu-spec

      - uses: chawyehsu/setup-moonup@v1
        with:
          moonbit-version: 0.1.20260707+ca43856
      - run: moonup default 0.1.20260707+ca43856
      - run: moon update

      - name: Run tests
        env:
          TARGET: ${{ matrix.target }}
          KUU_FIXTURES: ${{ github.workspace }}/_kuu-spec/fixtures
        run: moon test --target "$TARGET"
