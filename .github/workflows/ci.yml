name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - run: moon fmt --check
      - run: moon check --deny-warn

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target: [native, wasm-gc, wasm, js]
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - name: Run tests
        env:
          TARGET: ${{ matrix.target }}
        run: moon test --target "$TARGET"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: chawyehsu/setup-moonup@v1
      - run: moon coverage analyze -- -f summary
