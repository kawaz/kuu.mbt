name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # 公式 install script で rolling nightly を直取得 (moonup の nightly index は
      # 1 日遅延することがあり、toolchain 移行日 (例: assert_eq の Show→Debug) に
      # ローカルと CI で版が割れるため。CDN の binaries/nightly は当日更新される)
      - run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon version --all
      - run: moon update
      - run: moon fmt --check
      - run: moon check --deny-warn

  test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target: [wasm-gc, native]
    steps:
      - uses: actions/checkout@v7

      # conformance fixtures の正本 (kawaz/kuu) を SHA-pin で並置 checkout。
      # 追従は本 ref を bump する PR で明示化する (MDR-001 §5)。
      - name: Checkout kuu spec fixtures (SHA-pinned)
        uses: actions/checkout@v7
        with:
          repository: kawaz/kuu
          ref: 1c5d23cc08bcea403b8b2d8de54ef121f4850d76
          path: _kuu-spec

      # 公式 install script で rolling nightly を直取得 (moonup の nightly index は
      # 1 日遅延することがあり、toolchain 移行日 (例: assert_eq の Show→Debug) に
      # ローカルと CI で版が割れるため。CDN の binaries/nightly は当日更新される)
      - run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon update

      - name: Run tests
        env:
          TARGET: ${{ matrix.target }}
          KUU_FIXTURES: ${{ github.workspace }}/_kuu-spec/fixtures
        run: moon test --target "$TARGET"
